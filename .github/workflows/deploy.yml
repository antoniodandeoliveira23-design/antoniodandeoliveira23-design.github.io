name: Deploy AGORA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Quality Gate ─────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check critical vulnerabilities
        run: |
          CRITICAL=$(npm audit --json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const r=JSON.parse(d);
            const c=r.metadata && r.metadata.vulnerabilities && r.metadata.vulnerabilities.critical || 0;
            console.log(c);
          " 2>/dev/null || echo "0")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::warning::$CRITICAL critical vulnerability(ies) detected. Review before next deploy."
          fi

  # ── 2. Build ─────────────────────────────────────────────
  build:
    name: Build Expo Web
    runs-on: ubuntu-latest
    needs: quality
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://spzsdjrjejlemuompfgf.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwenNkanJqZWpsZW11b21wZmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDg3OTUsImV4cCI6MjA5MDMyNDc5NX0.3v3kK3H5jA6fiJ-hGMGX1Xxcupy-ngplbGrpVzVeVJQ
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web (static export)
        run: npm run build

      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-web-dist
          path: dist/
          retention-days: 1

  # ── 3. Deploy to GitHub Pages ─────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: agora-web-dist
          path: dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 4. Deploy to Vercel (optional - requires VERCEL_TOKEN) ─
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    env:
      VERCEL_ORG_ID: team_aUjYLNcbhZr9QUlNqrJDuUWE
      VERCEL_PROJECT_ID: prj_Z50TS7W4irtoy8acWw2OPVWtQsDz
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not configured - skipping Vercel deploy."
            echo "To enable Vercel deploys: GitHub Settings -> Secrets -> Actions -> VERCEL_TOKEN"
            echo "SKIP_VERCEL=true" >> $GITHUB_ENV
          else
            echo "VERCEL_TOKEN is configured, deploying to Vercel..."
            echo "SKIP_VERCEL=false" >> $GITHUB_ENV
          fi

      - name: Checkout
        if: env.SKIP_VERCEL == 'false'
        uses: actions/checkout@v4

      - name: Download build artifact
        if: env.SKIP_VERCEL == 'false'
        uses: actions/download-artifact@v4
        with:
          name: agora-web-dist
          path: dist/

      - name: Convert dist/ to Vercel build output format
        if: env.SKIP_VERCEL == 'false'
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Install Vercel CLI (latest)
        if: env.SKIP_VERCEL == 'false'
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Production)
        if: env.SKIP_VERCEL == 'false'
        id: deploy
        run: |
          url=$(vercel deploy --prod --prebuilt --token "$VERCEL_TOKEN" 2>&1 | tail -1)
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "Deploy complete: $url"
