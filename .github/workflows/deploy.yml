name: Deploy AGORA to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "vercel-deploy"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # A06 — Auditoria de segurança de dependências
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(npm audit --json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const r=JSON.parse(d);
            const c=r.metadata?.vulnerabilities?.critical||0;
            console.log(c);
          " 2>/dev/null || echo "0")
          echo "Vulnerabilidades críticas: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::warning::$CRITICAL vulnerabilidade(s) crítica(s) detectada(s). Revisar antes do próximo deploy."
          fi

      - name: Build Expo web (static export)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Copy index.html to 404.html (SPA fallback)
        run: cp dist/index.html dist/404.html

      # Deploy para Vercel com headers HTTP reais (A05)
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
