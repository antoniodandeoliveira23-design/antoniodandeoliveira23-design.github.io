name: Deploy AGORA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Quality Gate ─────────────────────────────────────
  quality:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Verificar vulnerabilidades críticas
        run: |
          CRITICAL=$(npm audit --json | node -e "
            const d=require('fs').readFileSync('/dev/stdin','utf8');
            const r=JSON.parse(d);
            const c=r.metadata?.vulnerabilities?.critical||0;
            console.log(c);
          " 2>/dev/null || echo "0")
          echo "Vulnerabilidades críticas: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::warning::$CRITICAL vulnerabilidade(s) crítica(s) detectada(s). Revisar antes do próximo deploy."
          fi

  # ── 2. Build ─────────────────────────────────────────────
  build:
    name: 🏗️ Build Expo Web
    runs-on: ubuntu-latest
    needs: quality
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://spzsdjrjejlemuompfgf.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwenNkanJqZWpsZW11b21wZmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDg3OTUsImV4cCI6MjA5MDMyNDc5NX0.3v3kK3H5jA6fiJ-hGMGX1Xxcupy-ngplbGrpVzVeVJQ
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web (static export)
        run: npm run build

      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-web-dist
          path: dist/
          retention-days: 1

  # ── 3a. Deploy → GitHub Pages (sempre ativo) ─────────────
  deploy-pages:
    name: 🌐 Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: agora-web-dist
          path: dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 3b. Deploy → Vercel (requer VERCEL_TOKEN secret) ─────
  deploy-vercel:
    name: 🚀 Deploy → Vercel
    runs-on: ubuntu-latest
    needs: build
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    env:
      VERCEL_ORG_ID: team_aUjYLNcbhZr9QUlNqrJDuUWE
      VERCEL_PROJECT_ID: prj_Z50TS7W4irtoy8acWw2OPVWtQsDz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: agora-web-dist
          path: dist/

      - name: Deploy to Vercel (Production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --prebuilt'
          working-directory: ./

      - name: 🎉 URL publicada
        run: echo "✅ Deploy Vercel concluído → ${{ steps.deploy.outputs.preview-url }}"
