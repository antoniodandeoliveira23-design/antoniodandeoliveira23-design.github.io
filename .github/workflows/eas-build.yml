name: EAS Build

on:
  push:
    # Preview: push em main
    branches: [main]
    # Production: tag semântica ex: v1.2.0
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  # Disparo manual com seleção de plataforma e perfil
  workflow_dispatch:
    inputs:
      platform:
        description: 'Plataforma'
        required: true
        default: 'all'
        type: choice
        options: [all, android, ios]
      profile:
        description: 'Perfil de build'
        required: true
        default: 'preview'
        type: choice
        options: [development, preview, production]

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false  # builds não devem ser cancelados no meio

jobs:
  # ── Preview build (push em main) ─────────────────────────
  preview:
    name: 📱 EAS Preview Build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build — Preview (Android + iOS)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          eas build \
            --platform all \
            --profile preview \
            --non-interactive \
            --no-wait

      - name: Link do build EAS
        run: echo "🔗 Acompanhe em https://expo.dev/accounts/antoniodandeoliveira23/projects/agora-app/builds"

  # ── Production build + submit (tag v*.*.*)  ──────────────
  production:
    name: 🏪 EAS Production + Submit
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build — Production (Android + iOS)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          eas build \
            --platform all \
            --profile production \
            --non-interactive

      - name: EAS Submit — Google Play + App Store
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          eas submit \
            --platform all \
            --latest \
            --non-interactive

  # ── Manual dispatch ────────────────────────────────────────
  manual:
    name: 🛠️ EAS Manual Build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build — ${{ inputs.profile }} / ${{ inputs.platform }}
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait
