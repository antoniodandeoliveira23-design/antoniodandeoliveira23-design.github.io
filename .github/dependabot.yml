version: 2
updates:
  # ── npm (dependências do app) ─────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Porto_Velho
    open-pull-requests-limit: 5
    groups:
      expo-packages:
        patterns:
          - 'expo*'
          - '@expo/*'
        update-types: [minor, patch]
      react-native:
        patterns:
          - 'react-native*'
          - 'react*'
        update-types: [minor, patch]
    labels: [dependencies, automated]
    ignore:
      # Não atualiza major automaticamente (breaking changes)
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # ── GitHub Actions ────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: '09:00'
      timezone: America/Porto_Velho
    labels: [dependencies, github-actions, automated]
