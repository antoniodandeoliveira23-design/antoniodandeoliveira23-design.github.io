# ═══════════════════════════════════════════════════════════════
# AGORA — Supabase CLI Configuration
# Docs: https://supabase.com/docs/reference/cli/config
#
# Uso:
#   supabase login
#   supabase link --project-ref <PROJECT_REF>
#   supabase db push              # aplica migrações
#   supabase functions deploy     # faz deploy de edge functions
# ═══════════════════════════════════════════════════════════════

project_id = "agora-vilhena"   # substitua pelo ref do projeto no Supabase Dashboard

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "10MiB"
# Buckets são criados via migration 003_storage_buckets.sql

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# URL do seu app (usado nos emails de confirmação)
site_url = "https://agora-vilhena.vercel.app"
additional_redirect_urls = [
  "http://localhost:8081",
  "http://localhost:8081/auth/callback",
  "http://localhost:19006",
  "http://localhost:19006/auth/callback",
  "exp://localhost:8081",
  "exp://localhost:8081/--/auth/callback",
  "agora://",
  "agora://auth/callback",
  "https://agora-vilhena.vercel.app/auth/callback",
  "com.agora.app://auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.email.smtp]
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "nao-responda@agora.app"
sender_name = "AGORA"

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Seu código AGORA: {{ .Code }}"
max_frequency = "5s"

[auth.external.google]
enabled = true
client_id     = "env(GOOGLE_CLIENT_ID)"
secret        = "env(GOOGLE_CLIENT_SECRET)"
# redirect_uri deve ser: https://<project-ref>.supabase.co/auth/v1/callback
redirect_uri  = ""
url           = ""
# Escopos adicionais para obter nome e foto do perfil
skip_nonce_check = false

[auth.external.apple]
enabled   = true
# Service ID configurado no Apple Developer Console
# Formato: com.agora.app.signin (diferente do Bundle ID)
client_id = "env(APPLE_CLIENT_ID)"
# JWT gerado com a Private Key do Apple Developer:
# kid + iss (Team ID) + sub (Client ID) + exp
secret    = "env(APPLE_CLIENT_SECRET)"

[auth.external.twitter]
enabled   = false
client_id = "env(TWITTER_CLIENT_ID)"
secret    = "env(TWITTER_CLIENT_SECRET)"

[auth.third_party.firebase]
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
